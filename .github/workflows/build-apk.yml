name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Build APK
        run: flutter build apk --release 2>&1 | tee build_log.txt || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build_log.txt

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: DailyFlow-apk
          path: build/app/outputs/flutter-apk/app-release.apk
