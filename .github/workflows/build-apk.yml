name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get

      - run: flutter build apk --release 2>&1 || true

      - run: flutter build apk --release --verbose 2>&1 | tail -100

      - uses: actions/upload-artifact@v4
        with:
          name: DailyFlow-apk
          path: build/app/outputs/flutter-apk/app-release.apk
