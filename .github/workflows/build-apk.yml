name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Build APK
        id: build
        run: |
          flutter build apk --release 2>&1 | tee build_log.txt
          echo "BUILD_EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Show build errors
        if: always()
        run: |
          echo "=== BUILD LOG (last 50 lines) ==="
          tail -50 build_log.txt
          echo "=== ERRORS ==="
          grep -i "error" build_log.txt || echo "No error lines found"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: |
            build_log.txt
            build/app/outputs/flutter-apk/app-release.apk
